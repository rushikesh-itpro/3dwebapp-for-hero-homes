<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hero Homes – Window View</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@200;300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #ffffff;
    --accent: #c8a96e;
    --sidebar-bg: rgba(10,10,10,0.88);
    --sidebar-w: 88px;
    --radius: 14px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--black);
    font-family: 'Jost', sans-serif;
    -webkit-font-smoothing: antialiased;
    touch-action: none;
    user-select: none;
  }

  #panoViewer {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
    background: var(--black);
  }
  #panoViewer .pnlm-ui .pnlm-about-msg,
  #panoViewer .pnlm-load-button { display: none !important; }

  #loader {
    position: fixed; inset: 0;
    background: var(--black);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    transition: opacity .6s ease, visibility .6s ease;
  }
  #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .loader-logo {
    font-family: 'Cormorant Garamond', serif; color: var(--white);
    font-size: clamp(1.1rem, 3vw, 1.6rem); font-weight: 300;
    letter-spacing: .35em; text-transform: uppercase; margin-bottom: 40px;
  }
  .loader-logo span { color: var(--accent); }
  .loader-bar-wrap { width: min(320px, 70vw); height: 2px; background: rgba(255,255,255,.12); border-radius: 99px; overflow: hidden; margin-bottom: 18px; }
  .loader-bar { height: 100%; background: linear-gradient(90deg, var(--accent), #e8c98e); border-radius: 99px; width: 0%; transition: width .15s linear; }
  .loader-pct { color: rgba(255,255,255,.45); font-size: .80rem; font-weight: 300; letter-spacing: .15em; }

  .ui-layer { transition: opacity .35s ease, visibility .35s ease; }
  .ui-layer.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .btn-back {
    position: fixed; top: 16px; left: 16px;
    width: 46px; height: 46px;
    background: var(--sidebar-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-radius: var(--radius); border: none; cursor: pointer; color: var(--white);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; transition: background .2s; text-decoration: none;
  }
  .btn-back:hover { background: rgba(200,169,110,.25); }

  .brand {
    position: fixed; top: 16px; left: 16px;
    display: flex; align-items: center; z-index: 200;
    background: var(--sidebar-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-radius: var(--radius); padding: 6px 10px;
  }

  #timeToggle {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 300; display: flex; align-items: center;
    background: var(--sidebar-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-radius: 40px; border: 1px solid rgba(255,255,255,.1); padding: 5px; gap: 3px;
  }
  .time-btn {
    display: flex; align-items: center; gap: 7px; padding: 8px 16px;
    border-radius: 30px; border: none; background: none; color: rgba(255,255,255,.45);
    font-family: 'Jost', sans-serif; font-size: .80rem; font-weight: 400;
    letter-spacing: .1em; text-transform: uppercase; cursor: pointer;
    transition: background .22s, color .22s; white-space: nowrap;
  }
  .time-btn svg { width: 15px; height: 15px; flex-shrink: 0; transition: stroke .22s; }
  .time-btn:hover { color: rgba(255,255,255,.75); }
  .time-btn.active { background: rgba(255,255,255,.1); color: var(--white); }
  .time-btn.active svg { stroke: var(--accent); }
  .time-divider { width: 1px; height: 18px; background: rgba(255,255,255,.12); flex-shrink: 0; }

  .top-actions { position: fixed; top: 16px; right: 16px; display: flex; gap: 8px; z-index: 200; }
  .top-actions button {
    width: 46px; height: 46px; background: var(--black); border-radius: 50%;
    border: none; cursor: pointer; color: var(--white);
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .15s;
  }
  .top-actions button:hover { background: #222; transform: scale(1.05); }

  #btnToggleUI {
    position: fixed; bottom: 28px; right: 16px;
    width: 46px; height: 46px;
    background: var(--sidebar-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-radius: 50%; border: 1px solid rgba(255,255,255,.12);
    cursor: pointer; color: var(--white);
    display: flex; align-items: center; justify-content: center;
    z-index: 500; transition: background .2s, transform .2s;
  }
  #btnToggleUI:hover { background: rgba(200,169,110,.25); transform: scale(1.05); }

  .sidebar {
    position: fixed; left: 16px; top: 50%; transform: translateY(-50%);
    width: var(--sidebar-w);
    background: var(--sidebar-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-radius: 20px; border: 1px solid rgba(255,255,255,.06);
    z-index: 200; padding: 8px 0; display: flex; flex-direction: column;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 5px; padding: 14px 6px; color: rgba(255,255,255,.55); cursor: pointer;
    transition: color .2s, background .2s; border-radius: 14px; margin: 2px 6px; text-decoration: none;
  }
  .nav-item:hover { color: var(--white); background: rgba(255,255,255,.07); }
  .nav-item.active { color: var(--white); background: rgba(255,255,255,.1); }
  .nav-item svg { width: 20px; height: 20px; stroke-width: 1.6; }
  .nav-item span { font-size: .6rem; font-weight: 400; letter-spacing: .08em; text-transform: uppercase; }

  /* ── WINDOW VIEW FLOOR SIDEBAR ── */
  #windowViewSidebar {
    position: fixed;
    right: 16px; top: 50%;
    transform: translateY(-50%);
    width: 78px;
    background: var(--sidebar-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,.06);
    z-index: 200;
    padding: 7px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .wv-label {
    font-family: 'Jost', sans-serif;
    font-size: .50rem;
    font-weight: 400;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: white;
    padding: 6px 0 9px;
    text-align: center;
    line-height: 1.3;
  }
  .wv-divider { width: 60%; height: 1px; background: rgba(255,255,255,.08); margin-bottom: 5px; }
  .wv-floor-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 10px 5px;
    color: rgba(255,255,255,.55);
    cursor: pointer;
    transition: color .2s, background .2s;
    border-radius: 13px;
    margin: 2px 5px;
    width: calc(100% - 10px);
    background: none;
    border: none;
    font-family: 'Jost', sans-serif;
  }
  .wv-floor-btn:hover { color: var(--white); background: rgba(255,255,255,.07); }
  .wv-floor-btn.active { color: var(--white); background: rgba(255,255,255,.1); }
  .wv-floor-btn.active .wv-floor-badge {
    background: rgba(200,169,110,.25);
    border-color: rgba(200,169,110,.6);
    color: var(--accent);
  }
  .wv-floor-badge {
    width: 30px;
    height: 30px;
    border-radius: 9px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: roboto;
    font-size: .80rem;
    font-weight: 700;
    color: white;
    transition: background .2s, border-color .2s, color .2s;
    flex-shrink: 0;
    letter-spacing: 0;
  }
  .wv-floor-btn:hover .wv-floor-badge {
    background: rgba(200,169,110,.15);
    border-color: rgba(200,169,110,.4);
    color: var(--accent);
  }
  .wv-floor-label {
    display: none;
    font-size: .44rem;
    font-weight: 400;
    letter-spacing: .05em;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.2;
    color: rgba(255,255,255,.45);
    transition: color .2s;
  }
  .wv-floor-btn.active .wv-floor-label,
  .wv-floor-btn:hover .wv-floor-label { color: var(--accent); }

  #wvStatusBar {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px; z-index: 200;
    background: var(--sidebar-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-radius: 40px; padding: 10px 20px; pointer-events: none;
  }
  #wvStatusBar svg { width: 13px; height: 13px; stroke: var(--accent); flex-shrink: 0; }
  #wvStatusBar span { color: rgba(255,255,255,.6); font-size: .7rem; font-weight: 400; letter-spacing: .12em; text-transform: uppercase; }
  #wvStatusBar strong { color: var(--white); font-weight: 400; }

  @media (max-width: 600px) {
    :root { --sidebar-w: 70px; }
    .brand { display: none; }
    .nav-item span { font-size: .52rem; }
    .time-btn span { display: none; }
    .time-btn { padding: 8px 12px; }
    #windowViewSidebar { width: 58px; }
    #wvStatusBar { bottom: 16px; padding: 8px 14px; }
  }

  @media (max-height: 500px) and (orientation: landscape) {
    :root { --sidebar-w: 56px; }
    .brand { display: none; }
    .btn-back { top: 8px; left: 8px; width: 32px; height: 32px; }
    .top-actions { top: 8px; right: 8px; gap: 5px; }
    .top-actions button { width: 32px; height: 32px; }
    #timeToggle { top: 8px; padding: 3px; }
    .time-btn { padding: 5px 7px; }
    .time-btn span { display: none; }
    .time-btn svg { width: 12px; height: 12px; }
    .sidebar { left: 8px; width: var(--sidebar-w); border-radius: 13px; padding: 2px 0; }
    .nav-item { padding: 6px 3px; gap: 3px; margin: 1px 3px; border-radius: 9px; }
    .nav-item svg { width: 14px; height: 14px; }
    .nav-item span { font-size: .44rem; }
    #windowViewSidebar { right: 8px; width: 52px; border-radius: 13px; padding: 2px 0; }
    .wv-floor-btn { padding: 4px 3px; gap: 3px; margin: 1px 3px; border-radius: 9px; }
    .wv-floor-badge { width: 20px; height: 20px; border-radius: 6px; font-size: .62rem; }
    .wv-floor-label { font-size: .34rem; }
    #wvStatusBar { bottom: 8px; padding: 6px 12px; }
    #btnToggleUI { bottom: 8px; right: 8px; width: 32px; height: 32px; }
  }

  /* ── CONTACT POPUP ── */
  #contactBackdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 800;
    opacity: 0; pointer-events: none;
    transition: opacity .3s ease;
  }
  #contactBackdrop.show { opacity: 1; pointer-events: all; }

  #contactPopup {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -48%) scale(.96);
    z-index: 900;
    width: min(480px, calc(100vw - 40px));
    max-height: calc(100vh - 24px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    background: rgba(10,10,10,.97);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 20px;
    padding: 32px 28px 28px;
    box-shadow: 0 32px 80px rgba(0,0,0,.8);
    opacity: 0; pointer-events: none;
    transition: opacity .3s ease, transform .3s cubic-bezier(.25,.46,.45,.94);
  }
  #contactPopup.show {
    opacity: 1; pointer-events: all;
    transform: translate(-50%, -50%) scale(1);
  }

  .cp-head {
    display: flex; align-items: flex-start;
    justify-content: space-between; margin-bottom: 6px;
  }
  .cp-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem; font-weight: 500;
    color: #fff; letter-spacing: .02em; line-height: 1.2;
  }
  .cp-close {
    width: 32px; height: 32px; flex-shrink: 0;
    background: rgba(255,255,255,.08);
    border: none; border-radius: 50%; cursor: pointer;
    color: rgba(255,255,255,.6);
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, color .2s; margin-top: 2px;
  }
  .cp-close:hover { background: rgba(255,255,255,.15); color: #fff; }
  .cp-sub {
    font-family: 'Jost', sans-serif;
    font-size: .78rem; color: rgba(255,255,255,.45);
    letter-spacing: .02em; margin-bottom: 24px;
  }

  .cp-field { margin-bottom: 16px; }
  .cp-label {
    display: block;
    font-family: 'Jost', sans-serif;
    font-size: .72rem; font-weight: 500;
    color: rgba(255,255,255,.7);
    letter-spacing: .06em; text-transform: uppercase;
    margin-bottom: 7px;
  }
  .cp-input {
    width: 100%; padding: 13px 16px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 10px;
    color: #fff;
    font-family: 'Jost', sans-serif; font-size: .88rem;
    outline: none;
    transition: border-color .2s, background .2s;
    -webkit-appearance: none;
  }
  .cp-input::placeholder { color: rgba(255,255,255,.25); }
  .cp-input:focus {
    border-color: rgba(200,169,110,.5);
    background: rgba(255,255,255,.08);
  }

  .cp-submit {
    width: 100%; padding: 14px;
    margin-top: 8px;
    background: #fff;
    border: none; border-radius: 10px;
    font-family: 'Jost', sans-serif;
    font-size: .88rem; font-weight: 500;
    letter-spacing: .08em; text-transform: uppercase;
    color: #0a0a0a; cursor: pointer;
    transition: background .2s, transform .15s;
  }
  .cp-submit:hover { background: #e8c98e; transform: scale(1.01); }
  .cp-submit:active { transform: scale(.99); }

  .cp-success {
    text-align: center; padding: 16px 0 8px;
    display: none;
  }
  .cp-success-icon {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(200,169,110,.15);
    border: 1px solid rgba(200,169,110,.3);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
  }
  .cp-success-icon svg { stroke: #c8a96e; }
  .cp-success h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem; color: #fff; margin-bottom: 6px;
  }
  .cp-success p {
    font-family: 'Jost', sans-serif;
    font-size: .76rem; color: rgba(255,255,255,.45);
  }

  @media (max-width: 600px) {
    #contactPopup { padding: 24px 20px 20px; border-radius: 16px; }
    .cp-title { font-size: 1.3rem; }
  }

  /* Contact popup — landscape mobile: compact, scrollable, anchored near top */
  @media (max-height: 500px) and (orientation: landscape) {
    #contactPopup {
      top: 8px;
      transform: translateX(-50%) scale(.96);
      max-height: calc(100vh - 16px);
      padding: 14px 16px 12px;
      border-radius: 14px;
      width: min(440px, calc(100vw - 120px));
    }
    #contactPopup.show {
      transform: translateX(-50%) scale(1);
    }
    .cp-title { font-size: 1.05rem; }
    .cp-sub { font-size: .66rem; margin-bottom: 10px; }
    .cp-field { margin-bottom: 8px; }
    .cp-label { font-size: .62rem; margin-bottom: 4px; }
    .cp-input { padding: 7px 11px; font-size: .78rem; border-radius: 8px; }
    .cp-submit { padding: 9px; font-size: .76rem; margin-top: 4px; border-radius: 8px; }
    .cp-success-icon { width: 34px; height: 34px; margin-bottom: 8px; }
    .cp-success h3 { font-size: .95rem; }
    .cp-success p { font-size: .66rem; }
  }

/* ── TILT / ROTATE SCREEN OVERLAY ── */
#tiltOverlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: #0a0a0a;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  text-align: center;
  padding: 24px;
  overflow: hidden;
}
#tiltOverlay.show { display: flex; }

#tiltParticles {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

#tiltPhoneWrap {
  position: relative;
  margin-bottom: 32px;
  width: 80px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tilt-ring {
  position: absolute;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 1.5px solid rgba(200,169,110,0.35);
  pointer-events: none;
}
.tilt-ring-2 {
  border-color: rgba(200,169,110,0.18);
}

#tiltPhone {
  width: 32px;
  height: 56px;
  filter: drop-shadow(0 0 10px rgba(200,169,110,0.5));
}

#tiltTitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.45rem;
  font-weight: 400;
  color: #ffffff;
  letter-spacing: .18em;
  text-transform: uppercase;
  line-height: 1.3;
  margin-bottom: 10px;
}

#tiltSub {
  font-family: 'Jost', sans-serif;
  font-size: .7rem;
  font-weight: 300;
  color: rgba(255,255,255,.4);
  letter-spacing: .14em;
  text-transform: uppercase;
  line-height: 1.8;
  margin-bottom: 28px;
}

.tilt-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: .55;
}
.tilt-divider-line {
  width: 28px;
  height: 1px;
  background: rgba(200,169,110,0.6);
}
</style>
</head>
<body>

<div id="panoViewer"></div>

<div id="loader">
  <div class="loader-logo">Hero<span>Reality</span></div>
  <div class="loader-bar-wrap"><div class="loader-bar" id="loaderBar"></div></div>
  <div class="loader-pct" id="loaderPct">Loading…</div>
</div>

<div class="brand ui-layer">
  <img src="palatial-project-logo.png" alt="The Palatial" style="height:52px;width:auto;display:block;object-fit:contain"/>
</div>

<div id="timeToggle" class="ui-layer">
  <button class="time-btn active" id="btnDay" title="Day view">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <span>Day</span>
  </button>
  <div class="time-divider"></div>
  <button class="time-btn" id="btnEvening" title="Evening view">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
    </svg>
    <span>Evening</span>
  </button>
</div>

<div class="top-actions ui-layer">
  <button title="Fullscreen" id="btnFullscreen">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
  </button>
  <button title="Contact" onclick="openContact()">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3-8.58A2 2 0 012.18 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.14A16 16 0 0015.86 17.09l1.41-1.41a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
  </button>
  <button title="Wishlist">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>

<div id="tiltOverlay">
  <canvas id="tiltParticles"></canvas>

  <div id="tiltPhoneWrap">
    <div class="tilt-ring"></div>
    <div class="tilt-ring tilt-ring-2"></div>
    <svg id="tiltPhone" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 56">
      <rect x="2" y="2" width="28" height="52" rx="4" fill="none" stroke="#c8a96e" stroke-width="2"/>
      <rect x="6" y="7" width="20" height="34" rx="2" fill="rgba(200,169,110,0.08)" stroke="rgba(200,169,110,0.25)" stroke-width="0.8"/>
      <circle cx="16" cy="47" r="2.5" fill="rgba(200,169,110,0.5)"/>
      <rect x="12" y="4" width="8" height="1.5" rx="1" fill="rgba(200,169,110,0.4)"/>
      <line x1="8" y1="15" x2="24" y2="15" stroke="rgba(200,169,110,0.2)" stroke-width="0.8"/>
      <line x1="8" y1="19" x2="20" y2="19" stroke="rgba(200,169,110,0.15)" stroke-width="0.8"/>
      <line x1="8" y1="23" x2="22" y2="23" stroke="rgba(200,169,110,0.15)" stroke-width="0.8"/>
    </svg>
  </div>

  <div id="tiltTitle">Rotate Device</div>

  <div id="tiltSub">
    Turn to landscape<br>for the best experience
  </div>

  <div class="tilt-divider">
    <div class="tilt-divider-line"></div>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
    <div class="tilt-divider-line" style="background:linear-gradient(to left,transparent,rgba(200,169,110,0.6))"></div>
  </div>
</div>

<script>
(function () {
  var overlay  = document.getElementById('tiltOverlay');
  var phone    = document.getElementById('tiltPhone');
  var wrap     = document.getElementById('tiltPhoneWrap');
  var rings    = document.querySelectorAll('.tilt-ring');
  var title    = document.getElementById('tiltTitle');
  var canvas   = document.getElementById('tiltParticles');
  var ctx      = canvas.getContext('2d');

  /* ── Show / hide logic ── */
  function checkOrientation() {
    var isPortrait = window.innerHeight > window.innerWidth;
    var isMobile   = window.innerWidth <= 768 || window.innerHeight <= 500;
    var shouldShow = isPortrait && isMobile;
    if (shouldShow && !overlay.classList.contains('show')) {
      overlay.style.opacity = '0';
      overlay.style.transition = 'opacity .5s ease';
      overlay.classList.add('show');
      resizeCanvas();
      setTimeout(function(){ overlay.style.opacity = '1'; }, 20);
    } else if (!shouldShow && overlay.classList.contains('show')) {
      overlay.style.opacity = '0';
      setTimeout(function(){ overlay.classList.remove('show'); }, 500);
    }
  }
  window.addEventListener('resize', checkOrientation);
  window.addEventListener('orientationchange', function(){ setTimeout(checkOrientation, 120); });
  checkOrientation();

  /* ── Particle canvas ── */
  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  var PCOUNT = 40;
  var pts = [];
  for (var i = 0; i < PCOUNT; i++) {
    pts.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.4 + 0.4,
      vx: (Math.random() - .5) * 0.22,
      vy: -Math.random() * 0.38 - 0.08,
      life: Math.random()
    });
  }

  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var j = 0; j < pts.length; j++) {
      var p = pts[j];
      p.life += 0.004;
      if (p.life > 1) {
        p.life = 0;
        p.x = Math.random() * canvas.width;
        p.y = canvas.height + 10;
      }
      p.x += p.vx;
      p.y += p.vy;
      var a = (0.45 * Math.sin(p.life * Math.PI)).toFixed(3);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200,169,110,' + a + ')';
      ctx.fill();
    }
  }

  /* ── Phone animation ── */
  var t = 0;
  var rotAngle = 0;
  var phase = 'idle';
  var phaseTimer = 0;

  function animate() {
    if (!overlay.classList.contains('show')) { requestAnimationFrame(animate); return; }

    t += 0.016;
    phaseTimer += 0.016;

    if (phase === 'idle' && phaseTimer > 1.4) { phase = 'tilting'; phaseTimer = 0; }
    else if (phase === 'tilting') {
      rotAngle += 3.0;
      if (rotAngle >= 90) { rotAngle = 90; phase = 'landscape'; phaseTimer = 0; }
    } else if (phase === 'landscape' && phaseTimer > 1.1) { phase = 'back'; phaseTimer = 0; }
    else if (phase === 'back') {
      rotAngle -= 3.0;
      if (rotAngle <= 0) { rotAngle = 0; phase = 'idle'; phaseTimer = 0; }
    }

    /* float */
    var floatY = (Math.sin(t * 1.8) * 4).toFixed(2);
    phone.style.transform = 'rotate(' + rotAngle + 'deg)';
    wrap.style.transform  = 'translateY(' + floatY + 'px)';

    /* glow */
    var glow = (0.35 + Math.sin(t * 2) * 0.15).toFixed(2);
    var glowPx = Math.round(8 + Math.sin(t * 2) * 4);
    phone.style.filter = 'drop-shadow(0 0 ' + glowPx + 'px rgba(200,169,110,' + glow + '))';

    /* rings */
    var s1 = (1 + Math.sin(t * 1.5) * 0.12).toFixed(3);
    var s2 = (1 + Math.sin(t * 1.5 + 1) * 0.18).toFixed(3);
    var o1 = (0.35 + Math.sin(t * 1.5) * 0.15).toFixed(3);
    var o2 = (0.18 + Math.sin(t * 1.5 + 1) * 0.12).toFixed(3);
    if (rings[0]) { rings[0].style.transform = 'scale(' + s1 + ')'; rings[0].style.opacity = o1; }
    if (rings[1]) { rings[1].style.transform = 'scale(' + s2 + ')'; rings[1].style.opacity = o2; }

    /* title shimmer */
    title.style.opacity = (0.85 + Math.sin(t * 0.9) * 0.15).toFixed(3);

    drawParticles();
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
<script>
(function() {
  var BASE_DIR    = 'hero-views-day-evening/';
  var FLOORS      = [10, 15, 20, 25, 30, 35, 40, 43];
  var currentMode = 'day';
  var activeFloor = 43;
  var viewer      = null;
  var uiVisible   = true;
  var savedYaw    = -55;
  var savedPitch  = -10;

  var btnDay      = document.getElementById('btnDay');
  var btnEvening  = document.getElementById('btnEvening');
  var btnToggle   = document.getElementById('btnToggleUI');
  var iconEye     = document.getElementById('iconEye');
  var iconEyeOff  = document.getElementById('iconEyeOff');
  var uiEls       = document.querySelectorAll('.ui-layer');
  var loader      = document.getElementById('loader');
  var loaderBar   = document.getElementById('loaderBar');
  var loaderPct   = document.getElementById('loaderPct');
  var statusFloor = document.getElementById('statusFloor');
  var statusMode  = document.getElementById('statusMode');

  function panoSrc(floor, mode) {
    return BASE_DIR + mode + ' ' + floor + '.webp';
  }

  function updateStatus() {
    statusFloor.textContent = activeFloor;
    statusMode.textContent  = currentMode.charAt(0).toUpperCase() + currentMode.slice(1);
  }

  function loadPano(floor, mode) {
    activeFloor = floor;
    currentMode = mode;
    updateStatus();

    document.querySelectorAll('.wv-floor-btn').forEach(function(b) { b.classList.remove('active'); });
    var activeBtn = document.querySelector('.wv-floor-btn[data-floor="' + floor + '"]');
    if (activeBtn) activeBtn.classList.add('active');

    if (viewer) {
      try { savedYaw = viewer.getYaw(); savedPitch = viewer.getPitch(); } catch(e) {}
      try { viewer.destroy(); } catch(e) {}
      viewer = null;
      document.getElementById('panoViewer').innerHTML = '';
    }

    viewer = pannellum.viewer('panoViewer', {
      type: 'equirectangular',
      panorama: panoSrc(floor, mode),
      autoLoad: true,
      showControls: false,
      showZoomCtrl: false,
      showFullscreenCtrl: false,
      compass: false,
      friction: 0.15,
      hfov: 100,
      minHfov: 50,
      maxHfov: 120,
      yaw: savedYaw,
      pitch: savedPitch
    });

    viewer.on('load', function() {
      loaderBar.style.width = '100%';
      loaderPct.textContent = '100%';
      setTimeout(function() { loader.classList.add('hidden'); }, 300);
    });
  }

  var progress = 0;
  var barTimer = setInterval(function() {
    progress = Math.min(progress + Math.random() * 15, 85);
    loaderBar.style.width = progress + '%';
    loaderPct.textContent = Math.round(progress) + '%';
  }, 100);
  setTimeout(function() { clearInterval(barTimer); }, 8000);

  loadPano(43, 'day');

  document.querySelectorAll('.wv-floor-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      loadPano(parseInt(this.dataset.floor), currentMode);
    });
  });

  btnDay.addEventListener('click', function() {
    btnDay.classList.add('active');
    btnEvening.classList.remove('active');
    loadPano(activeFloor, 'day');
  });
  btnEvening.addEventListener('click', function() {
    btnEvening.classList.add('active');
    btnDay.classList.remove('active');
    loadPano(activeFloor, 'evening');
  });

  btnToggle.addEventListener('click', function() {
    uiVisible = !uiVisible;
    uiEls.forEach(function(el) { el.classList.toggle('hidden', !uiVisible); });
    iconEye.style.display    = uiVisible ? 'block' : 'none';
    iconEyeOff.style.display = uiVisible ? 'none'  : 'block';
  });

  document.getElementById('btnFullscreen').addEventListener('click', function() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen && document.exitFullscreen();
    }
  });

  window.addEventListener('keydown', function(e) {
    if (e.key === 'h' || e.key === 'H') btnToggle.click();
    if (e.key === 'd' || e.key === 'D') { btnDay.classList.add('active'); btnEvening.classList.remove('active'); loadPano(activeFloor, 'day'); }
    if (e.key === 'e' || e.key === 'E') { btnEvening.classList.add('active'); btnDay.classList.remove('active'); loadPano(activeFloor, 'evening'); }
  });
})();
</script>
